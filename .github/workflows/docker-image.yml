name: Build & publish backend image

# Builds the Node.js backend proxy and pushes it to the GitHub Container
# Registry (GHCR). Portainer then pulls ghcr.io/<owner>/<repo> and runs it
# locally (see docker-compose.yml).

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'backend/**'
      - '.github/workflows/docker-image.yml'
  # Allow manual rebuilds from the Actions tab.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # metadata-action lowercases the image name (GHCR requires lowercase) and
      # derives sensible tags: `latest` on the default branch, the semver on
      # tags, plus the commit SHA.
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # QEMU lets the amd64 runner cross-build the arm64 image (e.g. for a
      # Raspberry Pi / ARM host running Portainer).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
